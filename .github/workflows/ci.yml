name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-simulator:
    name: Simulator Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run test --workspace=packages/simulator
      - run: npm run typecheck --workspace=packages/simulator

  build-frontend:
    name: Frontend Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Build simulator first
        run: npm run build --workspace=packages/simulator
      - run: npm run typecheck --workspace=packages/frontend
      - run: npm run build --workspace=packages/frontend

  typecheck-backend:
    name: Backend Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run typecheck --workspace=packages/backend
